<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0015" />
  <title>Not found — Wordfall</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
      background: radial-gradient(ellipse at top, #110028 0%, #0a0015 60%, #050010 100%);
      color: #f0e6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .glyph {
      font-family: 'SF Mono', monospace;
      font-size: 88px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ff2d95, #00d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; font-weight: 700; }
    p { color: #a08cc7; margin-bottom: 28px; line-height: 1.5; }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #ff2d95, #d6228a);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(255, 45, 149, 0.3);
      transition: transform .15s;
    }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glyph">404</div>
    <h1>This puzzle has no solution.</h1>
    <p>The page you were looking for fell through the grid.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
